 Records. Signed by Judge Armando O. Bonilla. (EAD) Service on parties made.","date":"01/15/2026","title":"24-506 &bull; WHITE v. USA","criteria":"reported","date_yyyymmdd":"20260115"},{"link":"https://ecf.cofc.uscourts.gov/cgi-bin/show_public_doc?2020vv2033-69-0","judge":"m_solomson","text":"JUDGE VACCINE REPORTED OPINION (PUBLIC VERSION)(Originally filed September 26, 2024) reissuing re: [64] Order on Motion for Review, Judge Vaccine Order/Opinion.  Signed by Chief Judge Matthew H. Solomson. (si) Service on parties made.","date":"01/14/2026","title":"20-2033 &bull; GOTHERS v. SECRETARY OF HEALTH AND HUMAN SERVICES","criteria":"reported","date_yyyymmdd":"20260114"},{"link":"https://ecf.cofc.uscourts.gov/cgi-bin/show_public_doc?2022vv0510-43-0","judge":"m_solomson","text":"JUDGE VACCINE REPORTED OPINION (PUBLIC VERSION)(Originally filed July 14, 2023) reissuing [37] Order on Motion for Miscellaneous Relief, Order on Motion for Review, Judge Vaccine Order/Opinion.  Signed by Chief Judge Matthew H. Solomson. (si) Service on parties made. Petitioner served via e-mail on 1/15/2026. (fm).","date":"01/14/2026","title":"22-510 &bull; ROGERS v. SECRETARY OF HEALTH AND HUMAN SERVICES","criteria":"reported","date_yyyymmdd":"20260114"},{"link":"https://ecf.cofc.uscourts.gov/cgi-bin/show_public_doc?2025cv2011-6-0","judge":"k_davis","text":"UNREPORTED OPINION AND ORDER granting [2] Motion for Leave to Proceed in forma pauperis and DISMISSING CASE for lack of jurisdiction. The Clerk is directed to enter judgment. Signed by Judge Kathryn C. Davis. (es) Service on parties made. Plaintiff served via certified mail no. 9589 0710 5270 2704 8726 90 on this day. Modified on 1/14/2026 (vds).","date":"01/13/2026","title":"25-2011 &bull; JONES v. USA","criteria":"unreported","date_yyyymmdd":"20260113"},{"link":"https://ecf.cofc.uscourts.gov/cgi-bin/show_public_doc?2025cv2011-6-0","judge":"k_davis","text":"UNREPORTED OPINION AND ORDER granting [2] Motion for Leave to Proceed in forma pauper function update_data() {
  let criteria = document.getElementsByName('criteria')[0].value;

    let add_record = true;
    if (judge != "all" && !(o.judge.includes(judge))) add_record = false;
    if (criteria != "all" && criteria != o.criteria) add_record = false;
    if (add_record) {
        html += '<a href="' + o.link + '">' + o.title + '</a><br>';
        html += '<i>Filed: ' + o.date + '</i>';
        html += '<p>' + o.text + '</p>';
        html += '<div class="divider"></div>';
        record_count += 1;
    }
  }
  html += '<small>Records found: ' + record_count + '</small>';
  document.getElementById('#data').innerHTML = html;
}
update_data();
